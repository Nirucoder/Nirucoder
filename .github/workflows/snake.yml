name: Generate Snake

on:
  schedule:
    # run automatically every 24 hours
    - cron: "0 0 * * *"
  
  # allows to manually run the job at any time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # generates a snake game from a github user contributions graph, output a svg animation
      - uses: Platane/snk@v3
        with:
          github_user_name: Nirucoder
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # push the content of <build_dir> to a branch
      # the content will be available at https://raw.githubusercontent.com/<github_user>/<repository>/<target_branch>/<file>
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
